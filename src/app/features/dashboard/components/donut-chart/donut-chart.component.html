<div class="card">
    <div class="card-header font-weight-bold">{{ title }}</div>
    <div class="card-body">
        <div id="chart" style="height: 350px;">
            <apx-chart
                *ngIf="data.length > 0; else noData"
                [series]="chartOptions.series"
                [labels]="chartOptions.labels"
                [chart]="chartOptions.chart"
                [dataLabels]="chartOptions.dataLabels"
                [plotOptions]="chartOptions.plotOptions"
                [legend]="chartOptions.legend"
                [tooltip]="chartOptions.tooltip"
                [responsive]="chartOptions.responsive"
            ></apx-chart>
            <ng-template #noData>
                <div *ngIf="!isLoading" class="text-center text-muted font-italic py-4">
                    There are no data provided.
                </div>
                <div *ngIf="isLoading" class="d-flex flex-column flex-md-row justify-content-between align-items-center align-items-md-start">
                    <div class="rounded-circle skeleton flex-grow-1 mb-3" style="aspect-ratio: 1 / 1; width: 300px; max-width: 350px;"></div>
                    <div class="skeleton d-none d-md-block" style="height: 120px; width: 100px;"></div>
                    <div class="skeleton d-block d-md-none" style="height: 30px; width: 80%;"></div>
                </div>
            </ng-template>
        </div>
    </div>
</div>
