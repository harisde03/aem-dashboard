<div class="card">
    <div class="card-header font-weight-bold">{{ title }}</div>
    <div class="card-body">
        <div id="chart" style="height: 350px;">
            <apx-chart
                *ngIf="data.length > 0; else noData"
                [series]="chartOptions.series"
                [chart]="chartOptions.chart"
                [plotOptions]="chartOptions.plotOptions"
                [dataLabels]="chartOptions.dataLabels"
                [xaxis]="chartOptions.xaxis"
                [grid]="chartOptions.grid"
                [responsive]="chartOptions.responsive"
            ></apx-chart>
            <ng-template #noData>
                <div *ngIf="!isLoading" class="text-center text-muted font-italic py-4">
                    There are no data provided.
                </div>
                <div *ngIf="isLoading" class="d-flex justify-content-between align-items-end">
                    <div *ngFor="let h of [150, 350, 300, 200, 250, 50, 320]" class="skeleton mx-1" [style.height.px]="h" style="flex: 1; max-width: 50px;">
                    </div>
                </div>
            </ng-template>
        </div>
    </div>
</div>
